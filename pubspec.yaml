name: sheetifye
description: "Flutter spreadsheet engine with XLSX/CSV support, live editing, undo/redo, formula evaluation, clipboard, autofill, and a full persistence lifecycle."
version: 1.1.0
homepage: https://github.com/vikaspoute/sheetifye
repository: https://github.com/vikaspoute/sheetifye
issue_tracker: https://github.com/vikaspoute/sheetifye/issues

topics:
  - excel
  - xlsx
  - csv
  - spreadsheet
  - editor
  
environment:
  sdk: ^3.11.5
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  collection: ^1.18.0
  intl: ^0.20.2
  google_fonts: ^8.1.0
  archive: ^4.0.9
  xml: ^7.0.1
  http: ^1.6.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^4.0.4
  build_runner: ^2.15.1
  freezed: ^3.2.5
  json_serializable: ^6.7.1
  riverpod_lint: ^3.1.4

