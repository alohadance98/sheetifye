name: sheetify
description: "A lightweight, virtualized Flutter spreadsheet viewer with native XLSX support."
version: 1.0.0
homepage: https://github.com/vikaspoute/sheetify
repository: https://github.com/vikaspoute/sheetify
issue_tracker: https://github.com/vikaspoute/sheetify/issues

topics:
  - spreadsheet
  - excel
  - xlsx
  - grid
  - table

environment:
  sdk: ^3.11.5
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  collection: ^1.18.0
  intl: ^0.19.0
  google_fonts: ^6.1.0
  archive: ^3.6.1
  xml: ^6.5.0
  http: ^1.2.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.7
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  custom_lint: ^0.5.7
  riverpod_lint: ^2.3.7

